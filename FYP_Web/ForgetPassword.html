<!DOCTYPE html>
<html lang="en" >
  <head>

    <meta charset="UTF-8">
    <title>Forget Your Password</title>
    <link rel="icon" href="./multimedia/icon/FYP_Icon.ico" type="image/x-icon"><!--设置网页图标-->
    <link rel="stylesheet" href="./css/forgetStyle.css">
    <link rel="stylesheet" href="./css/font.css"><!--设置自定义字体-->
    <script src="./js/ForgetPassword.js" type="text/javascript"></script><!--忘记密码检测函数-->

  </head>
  <body>

    <style type="text/css">/*定义页面字体*/
      div {
        font-family: cyberHead;
      }

      .active, p {
        font-family: cyberInfo;
      }

      a {
        font-family: cyberBtn;
      }

      input, label {
        font-family: cyberInput;
      }
    </style>

    <div class="change-box">
      <h2>Forget Your Password?</h2>
      <form action="PHP/ResetPassword.php" method="post" id="forget">
        <div class="user-box">
          <input type="text" placeholder="Your E-mail" id="forgetEmail" name="forgetEmail" maxlength="32" autocomplete="new-password">
          <label>User E-mail</label>
        </div>
        <div class="user-box">
          <input type="password" placeholder="Your New Password" id="forgetPasswd1" name="forgetPasswd1" maxlength="15" autocomplete="new-password">
          <label>New Password</label>
        </div>
        <div class="user-box">
          <input type="password" placeholder="Repeat Your New Password" id="forgetPasswd2" name="forgetPasswd2" maxlength="15" autocomplete="new-password">
          <label>Repeat New Password</label>
        </div>
        <a onclick="ForgetPasswd()">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          Submit
        </a>
      </form>
    </div>
  
  </body>
</html>
